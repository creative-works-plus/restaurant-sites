<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>制作サイト一覧</title>
<style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: #0b0b0d; color: #e8e6e1;
        font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
        padding: 40px 20px;
    }
    .wrap { max-width: 520px; width: 100%; }
    h1 { font-size: 1.3rem; font-weight: 600; margin: 0 0 28px; text-align: center; letter-spacing: 0.04em; }
    ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
    a {
        display: block; text-decoration: none; color: #e8e6e1;
        background: #17171a; border: 1px solid #2a2a2e; border-radius: 8px;
        padding: 18px 20px; font-size: 1.05rem; transition: 0.2s;
    }
    a:hover, a:focus-visible { border-color: #c9a063; color: #e8c98f; }
</style>
</head>
<body>
<div class="wrap">
    <h1>制作サイト一覧</h1>
    <ul>
        <li><a href="nagi/">居酒屋 凪</a></li>
        <li><a href="nagomidokoro-syu/">なごみ処 秀</a></li>
        <li><a href="konchiki/">こんちき</a></li>
        <li><a href="wagaya/">和が家</a></li>
        <li><a href="bonne-qualite/">イタリアン Bonne Qualité(ボンヌカリテ)</a></li>
        <li><a href="sumikichi/">炭きち</a></li>
        <li><a href="ikkaku/">食彩酒 一鶴</a></li>
    </ul>
</div>
</body>
</html>
